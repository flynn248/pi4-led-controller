services:
  led.webapi:
    image: ${DOCKER_REGISTRY-}ledwebapi
    container_name: led.webapi
    build:
      context: .
      dockerfile: src/Led.WebApi/Dockerfile
    depends_on:
      led.database:
        condition: service_healthy

  led.database:
    image: postgres:latest
    container_name: led.database
    environment:
      - POSTGRES_DB=ledApp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "ledApp"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s